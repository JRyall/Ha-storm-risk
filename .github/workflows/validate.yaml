name: Validate

on:
  push:
  pull_request:
  schedule:
    # Re-run weekly so upstream HACS/hassfest changes are caught even without a push.
    - cron: "0 6 * * 1"
  workflow_dispatch:

jobs:
  hacs:
    name: HACS validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: HACS Action
        uses: hacs/action@main
        with:
          category: integration
          # Brand assets live in the home-assistant/brands repo and are only
          # required for the HACS default store, not custom-repository installs.
          ignore: brands

  hassfest:
    name: Hassfest validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Hassfest
        uses: home-assistant/actions/hassfest@master
